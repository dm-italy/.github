name: Reusable Issue Triage

on:
  workflow_call:
    inputs:
      issue_number:
        required: true
        type: number
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      PROJECT_TOKEN:
        required: true

jobs:
  triage:
    runs-on: [self-hosted, X64, Linux]

    if: |
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest


      - uses: anthropics/claude-code-action@v1
        id: claude
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        with:
          display_report: 'false'
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
             --allowedTools "Bash(gh:*),Bash(cat:*),Bash(ls:*),Bash(find:*),Bash(grep:*),Read,Write,Edit"

          prompt: |
            Sei un Technical Analyst per DM Consulting. Analizza la issue #${{ github.event.issue.number }}.

            AUTORE ISSUE: @${{ github.event.issue.user.login }}

            ═══════════════════════════════════════════════════════════
            SISTEMA DI PRIORITÀ (basato su Story Points)
            ═══════════════════════════════════════════════════════════

            | Punti | Priorità | Valore campo progetto | Significato |
            |-------|----------|----------------------|-------------|
            | 1-2   | 🟢 Low      | Low      | Quick win, può aspettare |
            | 3-5   | 🟡 Medium   | Medium   | Lavoro standard |
            | 8     | 🟠 High     | High     | Complesso, richiede focus |
            | 13+   | 🔴 Critical | Urgent   | Epic, da spezzare in subtask |

            ═══════════════════════════════════════════════════════════
            ISSUE TYPE (tipi disponibili su GitHub)
            ═══════════════════════════════════════════════════════════

            Invece di usare label per il tipo, usa il campo "type" nativo
            della issue di GitHub tramite:
              gh issue edit <numero> --type "<Type>"

            Tipi disponibili: Bug, Feature, Task
            (usa il tipo più appropriato in base al contenuto della issue)

            ═══════════════════════════════════════════════════════════
            COME SETTARE LA PRIORITÀ SUL PROGETTO
            ═══════════════════════════════════════════════════════════

            La priorità NON va messa come label, ma come campo "Priority"
            sul progetto GitHub associato alla issue.

            Segui questi step:

            IMPORTANTE: Per le chiamate GraphQL ai progetti, usa SEMPRE
            il token $PROJECT_TOKEN con il flag --header, perché il
            GITHUB_TOKEN non ha permessi sui Projects V2 dell'org.

            STEP A: Trova il progetto e l'item della issue via GraphQL:
            ```bash
            GH_TOKEN="$PROJECT_TOKEN" gh api graphql -f query='
              query {
                repository(owner: "${{ github.repository_owner }}", name: "${{ github.event.repository.name }}") {
                  issue(number: ${{ github.event.issue.number }}) {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project {
                          id
                          field(name: "Priority") {
                            ... on ProjectV2SingleSelectField {
                              id
                              options { id name }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }'
            ```

            STEP B: Dall'output, identifica:
            - projectId: l'ID del progetto
            - itemId: l'ID dell'item (la issue nel progetto)
            - fieldId: l'ID del campo Priority
            - optionId: l'ID dell'opzione corrispondente alla priorità scelta
              (matcha il nome: "Low", "Medium", "High", "Urgent")

            STEP C: Setta il valore con la mutation:
            ```bash
            GH_TOKEN="$PROJECT_TOKEN" gh api graphql -f query='
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: "PROJECT_ID"
                  itemId: "ITEM_ID"
                  fieldId: "FIELD_ID"
                  value: { singleSelectOptionId: "OPTION_ID" }
                }) {
                  projectV2Item { id }
                }
              }'
            ```

            Se la issue non è associata a nessun progetto, salta il
            settaggio della priorità sul progetto e metti una nota nel
            commento: "⚠️ Issue non associata a un progetto, priorità
            non settata automaticamente."

            ═══════════════════════════════════════════════════════════
            FASE 1: RACCOLTA INFORMAZIONI
            ═══════════════════════════════════════════════════════════

            1.1 Leggi la issue corrente:
            gh issue view ${{ github.event.issue.number }}

            1.2 Cerca issue simili aperte (potenziali duplicati):
            gh issue list --state open --limit 50 --json number,title,body

            1.3 Cerca issue chiuse di recente correlate:
            gh issue list --state closed --limit 30 --json number,title,body,closedAt

            1.4 Cerca PR recenti che potrebbero aver fixato il problema:
            gh pr list --state merged --limit 20 --json number,title,body,mergedAt

            1.5 Controlla commit recenti:
            git log --oneline -30

            1.6 Analizza il codebase per capire la complessità:
            - Quanti file sono coinvolti?
            - Ci sono dipendenze complesse?
            - Serve migrazione database?
            - Impatta più microservizi?

            ═══════════════════════════════════════════════════════════
            FASE 2: DECISIONE (scegli UNA sola azione)
            ═══════════════════════════════════════════════════════════

            ─────────────────────────────────────────────────────────
            CASO A - ISSUE DUPLICATA
            ─────────────────────────────────────────────────────────
            Se trovi un'altra issue APERTA con la stessa richiesta:

            gh issue comment ${{ github.event.issue.number }} --body "## 🔄 Issue duplicata

            Questa issue è un duplicato di #[NUMERO_ORIGINALE].

            Continua la discussione nella issue originale.

            /cc @${{ github.event.issue.user.login }}"

            gh issue close ${{ github.event.issue.number }} --reason "not planned" --comment "Chiusa come duplicato di #[NUMERO]"
            gh issue edit ${{ github.event.issue.number }} --add-label "duplicate"

            ─────────────────────────────────────────────────────────
            CASO B - GIÀ FIXATA
            ─────────────────────────────────────────────────────────
            Se trovi PR merged o commit che ha già risolto:

            gh issue comment ${{ github.event.issue.number }} --body "## ✅ Già risolto

            Risolto in:
            - PR #[NUMERO] / Commit [SHA]
            - Merged il [DATA]

            Se il problema persiste, riapri con dettagli aggiuntivi.

            /cc @${{ github.event.issue.user.login }}"

            gh issue close ${{ github.event.issue.number }} --reason "completed"

            ─────────────────────────────────────────────────────────
            CASO C - DETTAGLI INSUFFICIENTI
            ─────────────────────────────────────────────────────────
            Se mancano informazioni essenziali:

            gh issue comment ${{ github.event.issue.number }} --body "## ❓ Servono più dettagli

            @${{ github.event.issue.user.login }} per procedere servono:

            **Mancante:**
            - [ ] [Cosa manca 1]
            - [ ] [Cosa manca 2]

            **Domande:**
            1. [Domanda 1]
            2. [Domanda 2]

            Aggiorna la issue e menziona @claude per nuova analisi."

            gh issue edit ${{ github.event.issue.number }} --add-label "needs-info"

            ─────────────────────────────────────────────────────────
            CASO D - ISSUE VALIDA → TRIAGE COMPLETO
            ─────────────────────────────────────────────────────────
            Se la issue è nuova, unica, con dettagli sufficienti:

            STEP 1: Stima gli Story Points
            - 1 punto: Fix typo, config change, <1h
            - 2 punti: Bug semplice, 1 file, 1-2h
            - 3 punti: Feature piccola, 2-3 file, 2-4h
            - 5 punti: Feature media, più file, 4-8h
            - 8 punti: Feature complessa, più servizi, 1-2 giorni
            - 13 punti: Epic, migrazione, architettura, 3-5 giorni

            STEP 2: Determina la priorità dalla tabella sopra

            STEP 3: Setta il tipo della issue:
            # Determina il tipo appropriato: Bug, Feature, o Task
            gh issue edit ${{ github.event.issue.number }} --type "[TIPO]"

            STEP 4: Setta la priorità sul progetto (segui le istruzioni
            nella sezione "COME SETTARE LA PRIORITÀ SUL PROGETTO" sopra)

            STEP 5: Posta il commento con analisi:

            gh issue comment ${{ github.event.issue.number }} --body "## 🔍 Analisi
            [2-3 frasi sul problema]

            ## 📁 File da modificare
            - \`path/file1.ts\` - descrizione
            - \`path/file2.py\` - descrizione

            ## 📋 Piano operativo
            1. **[Azione]**: descrizione
            2. **[Azione]**: descrizione
            3. **[Azione]**: descrizione

            ## 📊 Stima
            | Story Points | Complessità | Priorità | Tipo |
            |--------------|-------------|----------|------|
            | **X** | 🟢/🟡/🟠/🔴 | [PRIORITY] | [TIPO] |

            **Motivazione**: [1 frase che spiega la stima]

            ---
            *Triage automatico by Claude*"

            STEP 6: Aggiungi le label operative (solo triaged e points):
            gh issue edit ${{ github.event.issue.number }} --add-label "triaged,points:X"

            NOTA: NON aggiungere label di tipo (bug, enhancement, ecc.)
            né label di priorità (priority:*). Il tipo viene gestito dal
            campo type nativo e la priorità dal campo Priority del progetto.

            ─────────────────────────────────────────────────────────
            CASO E - AZIONE RICHIESTA ALL'AUTORE
            ─────────────────────────────────────────────────────────
            Se la issue richiede verifiche/test da parte dell'autore,
            OPPURE presenta incongruenze che solo l'autore può chiarire,
            OPPURE manca uno use case con input atteso e output atteso:

            gh issue comment ${{ github.event.issue.number }} --body "## 🎯 Azione richiesta a @${{ github.event.issue.user.login }}

            Ho analizzato la issue e prima di procedere servono verifiche da parte tua.

            **Cosa devi fare:**
            - [ ] [Verifica/test 1 - descrizione chiara di cosa controllare]
            - [ ] [Verifica/test 2 - descrizione chiara]

            **Incongruenze trovate:**
            > [Descrivi cosa non torna, es: 'Dici che il campo X è vuoto ma dal codice risulta obbligatorio dal 2024']

            **Use case mancante:**
            Per lavorare su questa issue serve almeno uno use case completo:

            | | Descrizione |
            |---|---|
            | **Precondizioni** | [Stato iniziale del sistema] |
            | **Input** | [Dati/azioni dell'utente] |
            | **Output atteso** | [Risultato atteso] |
            | **Output attuale** | [Cosa succede ora, se è un bug] |

            ⚠️ **Questa issue è assegnata a te** fino a completamento delle verifiche.
            Quando hai finito, aggiorna la issue e menziona @claude per una nuova analisi.

            ---
            *Triage automatico by Claude*"

            # Assegna la issue all'autore
            gh issue edit ${{ github.event.issue.number }} --add-assignee "${{ github.event.issue.user.login }}"
            gh issue edit ${{ github.event.issue.number }} --add-label "awaiting-author,needs-verification"

            ═══════════════════════════════════════════════════════════
            CRITERI DI STIMA
            ═══════════════════════════════════════════════════════════

            Aumenta i punti se:
            - Serve migrazione database (+3)
            - Impatta più di 2 microservizi (+2)
            - Richiede modifiche API breaking (+2)
            - Manca documentazione/test esistenti (+1)
            - Codice legacy senza test (+2)

            Riduci i punti se:
            - Pattern già esistente da copiare (-1)
            - Test già presenti (-1)
            - Documentazione chiara (-1)

            ═══════════════════════════════════════════════════════════
            REGOLE FINALI
            ═══════════════════════════════════════════════════════════

            - Rispondi SEMPRE in ITALIANO
            - Esegui SEMPRE un'azione (commento + tipo/priorità)
            - Menziona SEMPRE l'autore con @${{ github.event.issue.user.login }}
            - Per duplicati: cita SEMPRE il numero issue originale
            - Per piani: MASSIMO 25 righe
            - Assegna SEMPRE una priorità se la issue è valida
            - NON usare label per tipo e priorità: usa il campo type
              nativo e il campo Priority del progetto
            - Usa UN SOLO comando gh issue edit con tutte le label separate da virgola

            IMPORTANTE: Usa lo strumento per commentare sulla issue GitHub con la tua analisi.

      - name: Job Summary
        if: always()
        shell: python3 {0}
        env:
          EXEC_FILE: ${{ steps.claude.outputs.execution_file }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          import json, os
          exec_file = os.environ.get("EXEC_FILE", "")
          issue = os.environ.get("ISSUE_NUMBER", "?")
          summary_file = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_file, "a") as sf:
              if exec_file and os.path.isfile(exec_file):
                  with open(exec_file) as f:
                      data = json.load(f)
                  if isinstance(data, list):
                      data = data[-1] if data else {}
                  cost = data.get("total_cost_usd", 0)
                  turns = data.get("num_turns", 0)
                  duration_s = data.get("duration_ms", 0) // 1000
                  result = data.get("subtype", "unknown")
                  sf.write(f"## Claude Triage - #{issue}\n\n")
                  sf.write("| Metrica | Valore |\n|---------|--------|\n")
                  sf.write(f"| Risultato | {result} |\n")
                  sf.write(f"| Costo | ${cost} |\n")
                  sf.write(f"| Turns | {turns} |\n")
                  sf.write(f"| Durata | {duration_s}s |\n")
              else:
                  sf.write("Nessun output trovato\n")
